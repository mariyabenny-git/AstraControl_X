<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AstraControl-X | Tactical Command</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-grid">
        <aside class="sidebar">
            <div class="brand">ASTRACONTROL-X</div>
            <div class="nav-item active">TACTICAL</div>
            <div class="nav-item">TELEMETRY</div>
            <div class="nav-item">WARFARE</div>
            <div class="nav-item">LOGS</div>
        </aside>
        
        <header class="header">
            <h2>TACTICAL COMMAND CONSOLE: LRLACM-01</h2>
            <div id="clock">10:33:10 UTC</div>
        </header>

        <main class="main-view">
            <div class="widget" id="telemetry">
                <h3>TELEMETRY STREAM</h3>
                <canvas id="waveform"></canvas>
            </div>
            <div class="widget" id="map">
                <h3>ORBITAL_VECTOR_MAP</h3>
            </div>
        </main>

        <section class="right-panel">
            <div class="widget" id="threat">
                <h3>THREAT MATRIX</h3>
                <div class="grid-matrix" id="matrix"></div>
            </div>
        </section>

        <footer class="system-logs">
            <h3>SYSTEM LOGS</h3>
            <div id="log-container"></div>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
