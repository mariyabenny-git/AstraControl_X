<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AstraControl-X // HUD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hud-container">
        <header class="top-bar">
            <div class="logo">ASTRACONTROL_X // TACTICAL_CORE</div>
            <div class="status">STATUS: <span class="blink">LIVE</span></div>
        </header>

        <section class="grid-main">
            <div class="panel telemetry">
                <h3>TELEMETRY_WAVEFORM</h3>
                <canvas id="waveform"></canvas>
            </div>
            
            <div class="panel matrix">
                <h3>THREAT_MATRIX_VECTOR</h3>
                <div id="matrix-grid"></div>
            </div>

            <div class="panel logs">
                <h3>SYSTEM_EVENT_LOG</h3>
                <div id="log-feed"></div>
            </div>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
