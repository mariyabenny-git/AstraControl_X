<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AstraControl-X | Hackverse X 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>ASTRACONTROL-X: LRLACM C2 SIMULATOR</h1></header>
    <main class="grid-container">
        <section class="card" id="widget-telemetry">
            <h3>3D TELEMETRY GRID</h3>
            <div id="telemetry-data">Initializing sensor link...</div>
        </section>
        <section class="card" id="widget-engine">
            <h3>MANIK ENGINE DIAGNOSTICS</h3>
            <canvas id="engineCanvas"></canvas>
        </section>
        <section class="card" id="widget-cyber">
            <h3>CYBERSECURITY SHIELD</h3>
            <div id="cyber-status" class="status-pill">SECURE</div>
            <button onclick="toggleJamming()">INITIATE EW COUNTER-MEASURE</button>
        </section>
        <section class="card" id="widget-ai">
            <h3>AI STRATEGIC ADVISOR (MLP ENGINE)</h3>
            <p id="ai-advice">System Standby...</p>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
